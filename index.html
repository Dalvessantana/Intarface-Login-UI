<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login forms / DavidoGit</title>
    <link rel="stylesheet" href="css/sitle.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
   <div class="container">
     <div class="wrapper">
        <div class="title"><span>Login Form</span></div>
        <form action="#">
            <div class="row">
                <i class='bx bxs-user'></i>
                <input type="text" placeholder="email ou telefone" required>
            </div>
            <div class="row">
                <i class='bx bxs-lock-alt'></i>
                <input type="password" placeholder="senha" required>
            </div>
            <div class="pass"><a href="#">esqueceu a senha?</a></div>
            <div class="row button">
                <input type="submit" value="Login">
            </div>
            <div class="signup-link">Nao se lembra<a href="#"> relogue de novo </a>
            </div>
        </form>
    </div>
   </div>
</body>

</html>
